<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Manager | FastAPI Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-page:    #0d1117;
      --bg-card:    #161b22;
      --bg-input:   #0d1117;
      --border:     #30363d;
      --accent:     #6366f1;
      --accent-h:   #4f46e5;
      --danger:     #ef4444;
      --danger-h:   #dc2626;
      --success-bg: rgba(16,185,129,.12);
      --success-b:  rgba(16,185,129,.4);
      --success-t:  #6ee7b7;
      --error-bg:   rgba(239,68,68,.12);
      --error-b:    rgba(239,68,68,.4);
      --error-t:    #fca5a5;
      --text-1:     #e6edf3;
      --text-2:     #8b949e;
      --radius:     12px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-page);
      color: var(--text-1);
      min-height: 100vh;
      padding: 32px 20px;
    }

    /* ===== PAGE HEADER ===== */
    .page-header {
      text-align: center;
      margin-bottom: 36px;
    }
    .page-header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(120deg, #6366f1, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .page-header p { color: var(--text-2); margin-top: 6px; font-size: .9rem; }

    /* ===== STATUS ALERT ===== */
    #status-alert {
      max-width: 860px;
      margin: 0 auto 20px;
      padding: 13px 18px;
      border-radius: var(--radius);
      font-size: .875rem;
      font-weight: 500;
      display: none; /* shown by JS */
      animation: fadeSlide .3s ease;
    }
    #status-alert.success { background: var(--success-bg); border: 1px solid var(--success-b); color: var(--success-t); }
    #status-alert.error   { background: var(--error-bg);   border: 1px solid var(--error-b);   color: var(--error-t);   }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    /* ===== CARD ===== */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 32px;
      max-width: 860px;
      margin: 0 auto 28px;
    }
    .card-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-1);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-title::before {
      content: '';
      display: inline-block;
      width: 4px; height: 18px;
      background: var(--accent);
      border-radius: 4px;
    }

    /* ===== FORM GRID ===== */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label {
      font-size: .75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--text-2);
    }
    .form-group input {
      background: var(--bg-input);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 11px 14px;
      color: var(--text-1);
      font-size: .9rem;
      font-family: inherit;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .form-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99,102,241,.2);
    }
    .form-group input::placeholder { color: #3d444d; }

    .form-actions {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    /* ===== BUTTONS ===== */
    .btn {
      padding: 11px 22px;
      border: none;
      border-radius: 8px;
      font-size: .875rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s, opacity .15s;
    }
    .btn:hover  { transform: translateY(-2px); }
    .btn:active { transform: translateY(0); }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      color: #fff;
      box-shadow: 0 4px 15px rgba(99,102,241,.35);
    }
    .btn-primary:hover { box-shadow: 0 6px 20px rgba(99,102,241,.5); }

    .btn-ghost {
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--text-2);
    }
    .btn-ghost:hover { border-color: var(--text-2); color: var(--text-1); }

    /* ===== TABLE ===== */
    .table-wrapper { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: .875rem;
    }
    thead th {
      text-align: left;
      padding: 11px 14px;
      background: rgba(99,102,241,.08);
      color: var(--text-2);
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      border-bottom: 1px solid var(--border);
    }
    thead th:first-child { border-radius: 8px 0 0 8px; }
    thead th:last-child  { border-radius: 0 8px 8px 0; }

    tbody tr {
      border-bottom: 1px solid rgba(48,54,61,.6);
      transition: background .15s;
    }
    tbody tr:hover { background: rgba(255,255,255,.03); }
    tbody tr:last-child { border-bottom: none; }

    td { padding: 13px 14px; color: var(--text-1); vertical-align: middle; }

    .badge-id {
      display: inline-block;
      background: rgba(99,102,241,.15);
      color: #a78bfa;
      font-weight: 700;
      font-size: .78rem;
      padding: 2px 8px;
      border-radius: 20px;
    }
    .student-name  { font-weight: 600; }
    .student-email { color: var(--text-2); font-size: .82rem; }

    /* Action buttons inside the table */
    .btn-edit {
      background: rgba(99,102,241,.12);
      color: #a78bfa;
      border: 1px solid rgba(99,102,241,.3);
      padding: 5px 14px;
      border-radius: 6px;
      font-size: .8rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
      font-family: inherit;
    }
    .btn-edit:hover { background: rgba(99,102,241,.25); }

    .btn-delete {
      background: rgba(239,68,68,.1);
      color: #f87171;
      border: 1px solid rgba(239,68,68,.3);
      padding: 5px 14px;
      border-radius: 6px;
      font-size: .8rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
      font-family: inherit;
      margin-left: 6px;
    }
    .btn-delete:hover { background: rgba(239,68,68,.25); }

    .empty-row td {
      text-align: center;
      padding: 40px;
      color: var(--text-2);
      font-style: italic;
    }

    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
      .card { padding: 20px 16px; }
    }
  </style>
</head>
<body>

  <!-- ===== PAGE HEADER ===== -->
  <header class="page-header">
    <h1>🎓 Student Manager</h1>
    <p>FastAPI + SQLAlchemy + Vanilla JS — Full-Stack CRUD Dashboard</p>
  </header>

  <!-- ===== STATUS ALERT ===== -->
  <div id="status-alert"></div>

  <!-- ===== FORM CARD ===== -->
  <div class="card">
    <div class="card-title" id="form-title">Add New Student</div>
    <form id="student-form">
      <!-- Hidden input to hold the id during an edit operation -->
      <input type="hidden" id="edit-id" value="" />

      <div class="form-grid">
        <div class="form-group">
          <label for="first_name">First Name</label>
          <input type="text"     id="first_name" placeholder="e.g., John"        required />
        </div>
        <div class="form-group">
          <label for="last_name">Last Name</label>
          <input type="text"     id="last_name"  placeholder="e.g., Doe"         required />
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email"    id="email"      placeholder="john@example.com"   required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password"   placeholder="Enter password"     required />
        </div>
      </div>

      <div class="form-actions">
        <button type="submit"  id="submit-btn"  class="btn btn-primary">➕ Add Student</button>
        <button type="button"  id="cancel-btn"  class="btn btn-ghost" style="display:none">Cancel</button>
      </div>
    </form>
  </div>

  <!-- ===== TABLE CARD ===== -->
  <div class="card">
    <div class="card-title">All Students</div>
    <div class="table-wrapper">
      <table id="students-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="table-body">
          <!-- Rows injected by JavaScript -->
        </tbody>
      </table>
    </div>
  </div>


  <script>
    const API = 'http://localhost:8000/students';

    // ── DOM references ──────────────────────────────────────────
    const form      = document.getElementById('student-form');
    const tableBody = document.getElementById('table-body');
    const submitBtn = document.getElementById('submit-btn');
    const cancelBtn = document.getElementById('cancel-btn');
    const formTitle = document.getElementById('form-title');
    const editIdEl  = document.getElementById('edit-id');
    const alertEl   = document.getElementById('status-alert');

    // ── Utility: show a timed status alert ──────────────────────
    function showAlert(message, type = 'success') {
      alertEl.textContent = (type === 'success' ? '✅ ' : '❌ ') + message;
      alertEl.className = type;
      alertEl.style.display = 'block';
      // Auto-hide after 3.5 seconds
      setTimeout(() => { alertEl.style.display = 'none'; }, 3500);
    }

    // ── Utility: clear and reset the form to "Add" mode ─────────
    function resetForm() {
      form.reset();
      editIdEl.value = '';
      submitBtn.textContent = '➕ Add Student';
      formTitle.textContent = 'Add New Student';
      cancelBtn.style.display = 'none';
    }

    // ── Fetch & render all students on load ─────────────────────
    async function loadStudents() {
      try {
        const res  = await fetch(`${API}/`);
        const data = await res.json();
        renderTable(data);
      } catch {
        showAlert('Could not connect to the server. Is the API running?', 'error');
      }
    }

    // ── Build table rows from the students array ────────────────
    function renderTable(students) {
      if (students.length === 0) {
        tableBody.innerHTML = `
          <tr class="empty-row">
            <td colspan="4">No students found. Add one above!</td>
          </tr>`;
        return;
      }

      tableBody.innerHTML = students.map(s => `
        <tr id="row-${s.id}">
          <td><span class="badge-id">#${s.id}</span></td>
          <td>
            <div class="student-name">${s.first_name} ${s.last_name}</div>
          </td>
          <td><span class="student-email">${s.email}</span></td>
          <td>
            <button class="btn-edit"   onclick="startEdit(${s.id}, '${s.first_name}', '${s.last_name}', '${s.email}')">✏️ Edit</button>
            <button class="btn-delete" onclick="deleteStudent(${s.id})">🗑️ Delete</button>
          </td>
        </tr>
      `).join('');
    }

    // ── Handle form submission (Add OR Update) ──────────────────
    form.addEventListener('submit', async (e) => {
      e.preventDefault();  // Prevent page reload

      const payload = {
        first_name: document.getElementById('first_name').value.trim(),
        last_name:  document.getElementById('last_name').value.trim(),
        email:      document.getElementById('email').value.trim(),
        password:   document.getElementById('password').value,
      };

      const editId    = editIdEl.value;
      const isEditing = editId !== '';

      // Choose the correct method and URL based on mode
      const url    = isEditing ? `${API}/${editId}` : `${API}/`;
      const method = isEditing ? 'PUT' : 'POST';

      try {
        const res  = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const data = await res.json();

        if (!res.ok) throw new Error(data.detail || 'Something went wrong.');

        showAlert(isEditing ? 'Student updated successfully!' : 'Student added successfully!');
        resetForm();
        loadStudents();  // Refresh the table after any change
      } catch (err) {
        showAlert(err.message, 'error');
      }
    });

    // ── Populate the form for editing a student ─────────────────
    function startEdit(id, firstName, lastName, email) {
      editIdEl.value = id;
      document.getElementById('first_name').value = firstName;
      document.getElementById('last_name').value  = lastName;
      document.getElementById('email').value       = email;
      document.getElementById('password').value    = '';  // Don't pre-fill password

      submitBtn.textContent       = '💾 Update Student';
      formTitle.textContent       = `Editing Student #${id}`;
      cancelBtn.style.display     = 'inline-block';

      // Scroll up smoothly so the user sees the populated form
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ── Delete a student by id ───────────────────────────────────
    async function deleteStudent(id) {
      if (!confirm(`Are you sure you want to delete Student #${id}?`)) return;

      try {
        const res = await fetch(`${API}/${id}`, { method: 'DELETE' });
        if (!res.ok) throw new Error('Failed to delete student.');

        // Remove the row immediately from the DOM — no full reload needed
        document.getElementById(`row-${id}`)?.remove();

        // Show empty state if the table is now empty
        if (tableBody.querySelectorAll('tr:not(.empty-row)').length === 0) {
          tableBody.innerHTML = `<tr class="empty-row"><td colspan="4">No students found. Add one above!</td></tr>`;
        }

        showAlert(`Student #${id} deleted successfully.`);
      } catch (err) {
        showAlert(err.message, 'error');
      }
    }

    // ── Cancel button resets form to "Add" mode ─────────────────
    cancelBtn.addEventListener('click', resetForm);

    // ── Initial load ─────────────────────────────────────────────
    loadStudents();
  </script>
</body>
</html>
